<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nate Pittman — Product Designer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navigation — fixed to top of screen, stays visible while scrolling -->
  <nav class="nav">
    <span class="nav-wordmark">Nate Pittman</span>
    <a href="#contact" class="btn-primary">Contact</a>
  </nav>

  <!-- Main content lives here — padding-top in CSS pushes it below the fixed nav -->
  <main class="main">

    <!-- Hero section — headline, workplace context, bio, and divider -->
    <section class="hero">
      <div class="hero-copy">

        <div class="hero-header">
          <h1 class="hero-heading">I'm a Senior product designer based in Chattanooga, TN 🌲</h1>

          <!-- Workplace context: green tag + Ulta Beauty as a large link -->
          <div class="hero-workplace">
            <span class="tag tag-success">Designing AI experiences at</span>
            <a href="https://www.ulta.com" class="hero-company-link" target="_blank" rel="noopener">Ulta Beauty</a>
          </div>
        </div>

        <p class="hero-bio">I excel in framing problems and crafting solutions collaboratively across teams.</p>

      </div>

      <!-- Thin horizontal rule that separates the hero from the project grid -->
      <div class="hero-divider"></div>
    </section>

  </main>

</body>
</html>
